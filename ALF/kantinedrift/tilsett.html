<!DOCTYPE html>
<html lang="nn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantineplan ALF8 – Tilsett</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

<!-- ── Innlogging ─────────────────────────────────────────── -->
<div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-100">
    <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-8 w-full max-w-sm mx-4">
        <div class="text-center mb-6">
            <span class="text-4xl">🍽️</span>
            <h1 class="text-2xl font-bold text-slate-800 mt-2">Kantineturnus ALF8</h1>
            <p class="text-slate-500 text-sm mt-1">Logg inn som Tilsett</p>
        </div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Passord</label>
        <input type="password" id="password-input"
               class="w-full border border-slate-300 rounded-md p-3 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
               placeholder="Skriv inn passord..."
               onkeydown="if(event.key==='Enter') app.login()">
        <p id="login-error" class="hidden mt-2 text-sm text-red-600 font-medium"></p>
        <button id="login-btn" onclick="app.login()"
                class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition">
            Logg inn
        </button>
    </div>
</div>

<!-- ── Dashbord ───────────────────────────────────────────── -->
<div id="dashboard" class="hidden">

    <nav class="bg-indigo-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🍽️</span>
                    <span class="font-bold text-xl tracking-wide">Kantineturnus ALF8</span>
                    <span class="ml-4 px-2 py-1 bg-indigo-500 rounded text-xs font-bold uppercase tracking-wider">Tilsett</span>
                </div>
                <div id="sync-status" class="text-sm font-medium opacity-80">🟢 Oppdatert</div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8">

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-slate-200 pb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">Dine Oppgåver</h2>
                    <p class="text-slate-600 max-w-2xl">Her ser du kven du skal jobbe med og kva som er dagens meny. Kryss av for oppgåvene i sjekklista etter kvart som dei er utført.</p>
                </div>
                <div class="mt-4 md:mt-0 bg-indigo-50 border border-indigo-100 p-3 rounded-lg text-center min-w-[200px]">
                    <p class="text-xs text-indigo-600 font-bold uppercase tracking-wide mb-1">Driftsleiar på vakt</p>
                    <p id="driftsleiar-name" class="text-lg font-bold text-indigo-900">–</p>
                </div>
            </div>

            <div class="flex flex-col md:flex-row items-start md:items-center justify-between bg-slate-100 p-4 rounded-lg mb-8">
                <div class="mb-4 md:mb-0 w-full md:w-auto">
                    <label for="date-selector" class="block text-sm font-medium text-slate-700 mb-1">Velg arbeidsdag:</label>
                    <select id="date-selector"
                            class="bg-white border border-slate-300 text-slate-900 text-base rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 shadow-sm min-w-[250px]"
                            onchange="app.selectDate(this.value)"></select>
                </div>
                <div class="text-left md:text-right w-full md:w-auto mt-2 md:mt-0">
                    <span id="current-week-badge" class="inline-block bg-indigo-100 text-indigo-800 text-sm font-semibold px-3 py-1 rounded-full">–</span>
                    <div id="current-date-display" class="text-xl font-bold text-slate-800 mt-1">–</div>
                </div>
            </div>

            <div id="menu-container" class="mb-6"></div>
            <div id="today-content" class="grid grid-cols-1 lg:grid-cols-3 gap-6"></div>

        </div>
    </div>
</div><!-- /dashboard -->

<script>
const API_URL  = 'https://script.google.com/macros/s/AKfycbwVI5VvoU9NvGylw0wD7AeTJO5t9nHxQBcHHFT3JdOgzLfNLEf1XGV7P3jOOZ1S3BetnA/exec';
const APP_ROLE = 'tilsett';

const app = {

    /* ── State ─────────────────────────────────────────────── */
    state: {
        password:      null,
        currentDateId: null,
        isSaving:      false,
        kalender:      [],
        bemanning:     { driftsleiarar: {}, turnus: { A: {}, B: {}, C: {} } },
        tasksList:     { early: [], late: [] },
        attendance:    {},
        tasks:         {},
        menus:         {}
    },

    /* ── Auth ──────────────────────────────────────────────── */
    init() { document.getElementById('password-input').focus(); },

    async login() {
        const pwd  = document.getElementById('password-input').value.trim();
        if (!pwd) return;
        const btn  = document.getElementById('login-btn');
        const errEl = document.getElementById('login-error');
        btn.textContent = '⏳ Logger inn...';
        btn.disabled = true;
        errEl.classList.add('hidden');
        try {
            const json = await this._post({ action: 'load', password: pwd });
            if (json.error) {
                errEl.textContent = json.error;
                errEl.classList.remove('hidden');
                btn.textContent = 'Logg inn';
                btn.disabled = false;
                return;
            }
            this.state.password = pwd;
            this._applyResponse(json);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            this.state.currentDateId = this.getInitialDateId();
            this.populateDateSelector();
            this.renderToday();
            setInterval(() => this.fetchDataFromAPI(true), 10000);
        } catch {
            errEl.textContent = 'Kunne ikkje nå serveren. Prøv igjen.';
            errEl.classList.remove('hidden');
            btn.textContent = 'Logg inn';
            btn.disabled = false;
        }
    },

    /* ── API ────────────────────────────────────────────────── */
    async _post(extra) {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ role: APP_ROLE, password: this.state.password, ...extra })
        });
        return res.json();
    },

    async fetchDataFromAPI(silent = false) {
        if (this.state.isSaving) return;
        if (!silent) document.getElementById('sync-status').textContent = '⏳ Hentar data...';
        try {
            const json = await this._post({ action: 'load' });
            if (json.error) return;
            this._applyResponse(json);
            this.renderToday();
            document.getElementById('sync-status').textContent = '🟢 Oppdatert';
        } catch { document.getElementById('sync-status').textContent = '🟡 Frakobla'; }
    },

    quickSave(payload) {
        this.state.isSaving = true;
        document.getElementById('sync-status').textContent = '⏳ Lagrar...';
        this._post({ action: 'save', ...payload })
            .then(() => { document.getElementById('sync-status').textContent = '🟢 Oppdatert'; })
            .catch(() => { document.getElementById('sync-status').textContent = '🔴 Feil ved lagring'; })
            .finally(() => { this.state.isSaving = false; });
    },

    _applyResponse(json) {
        this.state.kalender   = json.kalender   || [];
        this.state.bemanning  = json.bemanning  || { driftsleiarar: {}, turnus: { A:{}, B:{}, C:{} } };
        this.state.tasksList  = json.tasksList  || { early: [], late: [] };
        this.state.attendance = json.attendance || {};
        this.state.tasks      = json.tasks      || {};
        this.state.menus      = json.menus      || {};
    },

    /* ── Hjelpar ────────────────────────────────────────────── */
    esc: str => String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'),

    getWeekdayName(dateId) {
        const d = new Date(dateId + 'T12:00:00');
        return ['Sundag','Måndag','Tysdag','Onsdag','Torsdag','Fredag','Laurdag'][d.getDay()];
    },

    getDateStr(dateId) {
        const [, m, d] = dateId.split('-');
        return `${d}.${m}`;
    },

    getDayData(dateId) {
        return this.state.kalender.find(d => d.id === dateId) ?? null;
    },

    getDayStaffing(dateId) {
        const day = this.getDayData(dateId);
        if (!day) return { tidleg: '', seint: '' };
        if (day.turnusType === 'Ferie') return { tidleg: 'Feriestengd', seint: 'Feriestengd' };
        const tpl = this.state.bemanning.turnus?.[day.turnusType]?.[this.getWeekdayName(dateId)];
        return {
            tidleg: day.tidlegOverstyre || tpl?.tidleg || '',
            seint:  day.sentOverstyre  || tpl?.seint  || ''
        };
    },

    groupByWeek() {
        const map = new Map();
        for (const day of this.state.kalender) {
            if (!map.has(day.veke)) map.set(day.veke, { veke: day.veke, turnusType: day.turnusType, days: [] });
            map.get(day.veke).days.push(day);
        }
        return [...map.values()].sort((a, b) => a.veke - b.veke);
    },

    getInitialDateId() {
        if (!this.state.kalender.length) return null;
        const today = new Date(); today.setHours(0,0,0,0);
        for (const day of this.state.kalender) {
            if (new Date(day.id + 'T12:00:00') >= today && day.status === 'open') return day.id;
        }
        return this.state.kalender[0].id;
    },

    /* ── Dato-vel ───────────────────────────────────────────── */
    populateDateSelector() {
        const sel = document.getElementById('date-selector');
        sel.innerHTML = '';
        const weeks = this.groupByWeek();
        if (!weeks.length) {
            sel.innerHTML = '<option disabled selected>Ingen veker publisert enno</option>';
            return;
        }
        weeks.forEach(w => {
            const og = document.createElement('optgroup');
            og.label = `Veke ${w.veke} (Turnus ${w.turnusType})`;
            w.days.forEach(day => {
                const opt = document.createElement('option');
                opt.value = day.id;
                opt.textContent = `${this.getWeekdayName(day.id)} ${this.getDateStr(day.id)}`;
                if (day.id === this.state.currentDateId) opt.selected = true;
                og.appendChild(opt);
            });
            sel.appendChild(og);
        });
    },

    selectDate(dateId) {
        this.state.currentDateId = dateId;
        this.renderToday();
    },

    /* ── Toggle oppgåve ─────────────────────────────────────── */
    toggleTask(type, index) {
        const dateId  = this.state.currentDateId;
        if (!this.state.tasks[dateId]) this.state.tasks[dateId] = {};
        const key     = `${type}_${index}`;
        const newVal  = !(this.state.tasks[dateId][key] || false);
        this.state.tasks[dateId][key] = newVal;
        this.renderToday();
        this.quickSave({ type: 'tasks', dateId, key, value: newVal });
    },

    /* ── Render i dag ───────────────────────────────────────── */
    renderToday() {
        const menuEl    = document.getElementById('menu-container');
        const contentEl = document.getElementById('today-content');

        if (!this.state.kalender.length || !this.state.currentDateId) {
            document.getElementById('driftsleiar-name').textContent  = '–';
            document.getElementById('current-week-badge').textContent = '–';
            document.getElementById('current-date-display').textContent = '–';
            menuEl.innerHTML = '';
            contentEl.innerHTML = `
              <div class="lg:col-span-3 bg-blue-50 border border-blue-200 rounded-xl p-8 text-center">
                <span class="text-4xl mb-4 block">📋</span>
                <h3 class="text-xl font-bold text-blue-800 mb-2">Turnusen er ikkje publisert enno</h3>
                <p class="text-blue-600">Læraren har ikkje lagt inn semesteret enno.</p>
              </div>`;
            return;
        }

        const day     = this.getDayData(this.state.currentDateId);
        if (!day) return;
        const dateId   = day.id;
        const weekday  = this.getWeekdayName(dateId);

        document.getElementById('current-week-badge').textContent   = `Veke ${day.veke} (Turnus ${day.turnusType})`;
        document.getElementById('current-date-display').textContent = `${weekday} ${this.getDateStr(dateId)}`;
        document.getElementById('driftsleiar-name').textContent     = this.state.bemanning.driftsleiarar?.[weekday] || '–';

        if (day.status === 'closed') {
            menuEl.innerHTML = '';
            contentEl.innerHTML = `
              <div class="lg:col-span-3 bg-red-50 border border-red-200 rounded-xl p-8 text-center">
                <span class="text-4xl mb-4 block">🚫</span>
                <h3 class="text-2xl font-bold text-red-800 mb-2">Kantina er stengt</h3>
                <p class="text-red-600 text-lg">${this.esc(day.merknad) || 'Fri dag'}</p>
              </div>`;
            return;
        }

        // Meny — berre lesemodus for tilsett
        const menyTekst = this.state.menus[dateId]?.['dagens'] || '';
        menuEl.innerHTML = `
          <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 shadow-sm">
            <div class="flex items-center mb-2">
              <span class="text-2xl mr-3">🍲</span>
              <h3 class="text-xl font-bold text-amber-900">Dagens Meny</h3>
            </div>
            <p class="text-amber-800 text-lg font-medium ml-9">
              ${menyTekst ? this.esc(menyTekst) : '<i class="text-amber-700/60 font-normal">Ingen meny er lagt inn enno.</i>'}
            </p>
          </div>`;

        const { tidleg, seint } = this.getDayStaffing(dateId);

        // Elevliste — berre visning (ingen klikk)
        const renderStudents = (nameStr) => {
            if (!nameStr?.trim()) return '<p class="text-slate-400 italic text-sm">Ingen oppført.</p>';
            return nameStr.split(',').map(n => {
                const name     = n.trim();
                const present  = this.state.attendance[dateId]?.[name] ?? true;
                const cls      = present ? 'bg-emerald-50 text-emerald-900 border-emerald-200' : 'bg-red-50 text-red-800 border-red-200 opacity-60';
                const icon     = present ? '✅' : '❌ Fråvær';
                const decor    = present ? '' : 'line-through text-red-500';
                return `<div class="w-full px-4 py-3 rounded-lg border cursor-default flex items-center justify-between ${cls}">
                          <span class="font-medium ${decor}">${this.esc(name)}</span>
                          <span class="text-sm font-bold">${icon}</span>
                        </div>`;
            }).join('');
        };

        // Sjekkliste — tilsett kan krysse av
        const renderTasks = (type, list) => list.map((task, i) => {
            const done = this.state.tasks[dateId]?.[`${type}_${i}`] || false;
            return `<label class="flex items-start space-x-3 p-2 rounded transition cursor-pointer hover:bg-slate-50">
                      <input type="checkbox" onchange="app.toggleTask('${type}',${i})" ${done ? 'checked' : ''}
                             class="mt-1 w-5 h-5 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
                      <span class="${done ? 'line-through text-slate-400' : 'text-slate-700'}">${this.esc(task)}</span>
                    </label>`;
        }).join('');

        contentEl.innerHTML = `
          <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
            <div class="flex items-center mb-4">
              <span class="text-2xl mr-3">☀️</span>
              <div><h3 class="text-xl font-bold text-slate-800">Tidleg Vakt</h3>
                   <p class="text-sm font-medium text-indigo-600">11:00 – 11:30</p></div>
            </div>
            <div class="space-y-2">${renderStudents(tidleg)}</div>
          </div>

          <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
            <div class="flex items-center mb-4">
              <span class="text-2xl mr-3">🌙</span>
              <div><h3 class="text-xl font-bold text-slate-800">Seint Vakt</h3>
                   <p class="text-sm font-medium text-indigo-600">11:25 – 11:40</p></div>
            </div>
            <div class="space-y-2">${renderStudents(seint)}</div>
          </div>

          <div class="bg-slate-100 border border-slate-200 rounded-xl p-6 shadow-inner">
            <div class="flex items-center mb-4">
              <span class="text-2xl mr-3">📋</span>
              <h3 class="text-xl font-bold text-slate-800">Sjekkliste</h3>
            </div>
            <div class="mb-4">
              <p class="font-semibold text-slate-800 border-b border-slate-300 pb-1 mb-2">Tidleg vakt:</p>
              <div class="space-y-1">${renderTasks('early', this.state.tasksList.early)}</div>
            </div>
            <div>
              <p class="font-semibold text-slate-800 border-b border-slate-300 pb-1 mb-2">Seint vakt:</p>
              <div class="space-y-1">${renderTasks('late', this.state.tasksList.late)}</div>
            </div>
          </div>`;
    }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
