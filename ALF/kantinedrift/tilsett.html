<!DOCTYPE html>
<html lang="nn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantineplan ALF8 - Tilsett</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- Innloggingsskjerm -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-100">
        <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-8 w-full max-w-sm mx-4">
            <div class="text-center mb-6">
                <span class="text-4xl">🍽️</span>
                <h1 class="text-2xl font-bold text-slate-800 mt-2">Kantineturnus ALF8</h1>
                <p class="text-slate-500 text-sm mt-1">Logg inn som Tilsett</p>
            </div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Passord</label>
            <input type="password" id="password-input"
                   class="w-full border border-slate-300 rounded-md p-3 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                   placeholder="Skriv inn passord..."
                   onkeydown="if(event.key==='Enter') app.login()">
            <p id="login-error" class="hidden mt-2 text-sm text-red-600 font-medium"></p>
            <button id="login-btn" onclick="app.login()"
                    class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition">
                Logg inn
            </button>
        </div>
    </div>

    <!-- Dashbord (skjult til innlogging er OK) -->
    <div id="dashboard" class="hidden">

        <nav class="bg-indigo-700 text-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center space-x-3">
                        <span class="text-2xl">🍽️</span>
                        <span class="font-bold text-xl tracking-wide">Kantineturnus ALF8</span>
                        <span class="ml-4 px-2 py-1 bg-indigo-500 rounded text-xs font-bold uppercase tracking-wider">Tilsett</span>
                    </div>
                    <div id="sync-status" class="text-sm font-medium opacity-80">🟢 Oppdatert</div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8">

                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-slate-200 pb-6">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">Dine Oppgåver</h2>
                        <p class="text-slate-600 max-w-2xl">Her ser du kven du skal jobbe med og kva som er dagens meny. Kryss av for oppgåvene i sjekklista etter kvart som dei er utført.</p>
                    </div>
                    <div class="mt-4 md:mt-0 bg-indigo-50 border border-indigo-100 p-3 rounded-lg text-center min-w-[200px]">
                        <p class="text-xs text-indigo-600 font-bold uppercase tracking-wide mb-1">Driftsleiar på vakt</p>
                        <p id="driftsleiar-name" class="text-lg font-bold text-indigo-900"></p>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row items-start md:items-center justify-between bg-slate-100 p-4 rounded-lg mb-8">
                    <div class="mb-4 md:mb-0 w-full md:w-auto">
                        <label for="date-selector" class="block text-sm font-medium text-slate-700 mb-1">Velg arbeidsdag:</label>
                        <select id="date-selector" class="bg-white border border-slate-300 text-slate-900 text-base rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 shadow-sm min-w-[250px]" onchange="app.selectDate(this.value)"></select>
                    </div>
                    <div class="text-left md:text-right w-full md:w-auto mt-2 md:mt-0">
                        <span id="current-week-badge" class="inline-block bg-indigo-100 text-indigo-800 text-sm font-semibold px-3 py-1 rounded-full">Veke -- (Turnus --)</span>
                        <div id="current-date-display" class="text-xl font-bold text-slate-800 mt-1">--.--.----</div>
                    </div>
                </div>

                <div id="menu-container" class="mb-6"></div>
                <div id="today-content" class="grid grid-cols-1 lg:grid-cols-3 gap-6"></div>

            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwVI5VvoU9NvGylw0wD7AeTJO5t9nHxQBcHHFT3JdOgzLfNLEf1XGV7P3jOOZ1S3BetnA/exec';
        const APP_ROLE = 'tilsett';

        const app = {
            state: {
                password: null,
                currentDateId: null,
                attendance: {},
                tasks: {},
                menus: {}
            },
            data: {
                driftsleiarar: {
                    'Måndag': 'Kari (9A)',
                    'Tysdag': 'Ola (9B)',
                    'Onsdag': 'Silje (9C)',
                    'Torsdag': 'Petter (9A)',
                    'Fredag': 'Amalie (9C)'
                },
                tasksList: {
                    early: [
                        "Dele ut skulemjølk",
                        "Opne kantina",
                        "Gjere varmmat klar til servering",
                        "Drive sal i luka"
                    ],
                    late: [
                        "Rydde i heile kantineområdet",
                        "Vaske av bord og kantinedisk",
                        "Ta eventuell oppvask"
                    ]
                },
                schedule: [
                    { week: 16, type: 'C', days: [
                        { id: '2026-04-13', dateStr: '13.04', day: 'Måndag', early: 'Linnea, Magnus, Emilia', late: 'Kamilla, Johannes F, Johannes L', status: 'open' },
                        { id: '2026-04-14', dateStr: '14.04', day: 'Tysdag', early: 'Jacob, Cecilie, Kasper', late: 'Emil, Nora, Noa', status: 'open' },
                        { id: '2026-04-15', dateStr: '15.04', day: 'Onsdag', early: 'Inga vakt', late: 'Inga vakt', status: 'closed', note: 'Løp for Livet' },
                        { id: '2026-04-16', dateStr: '16.04', day: 'Torsdag', early: 'Cassie, Lone, Johannes L', late: 'Sivert, Serina, Emma', status: 'open' },
                        { id: '2026-04-17', dateStr: '17.04', day: 'Fredag', early: 'Emil, Johannes F', late: 'Cecilie, Magnus', status: 'open' }
                    ]},
                    { week: 17, type: 'A', days: [
                        { id: '2026-04-20', dateStr: '20.04', day: 'Måndag', early: 'Nora, Emilia, Kasper', late: 'Kamilla, Lone, Serina', status: 'open' },
                        { id: '2026-04-21', dateStr: '21.04', day: 'Tysdag', early: 'Noa, Johannes L, Loke', late: 'Sivert, Cassie, Enea', status: 'open' },
                        { id: '2026-04-22', dateStr: '22.04', day: 'Onsdag', early: 'Emil, Linnea, Emma', late: 'Cecilie, Celina, Nora', status: 'open' },
                        { id: '2026-04-23', dateStr: '23.04', day: 'Torsdag', early: 'Magnus, Hanna, Serina', late: 'Jacob, Emilia, Noa', status: 'open' },
                        { id: '2026-04-24', dateStr: '24.04', day: 'Fredag', early: 'Sivert, Lone', late: 'Johannes F, Kasper', status: 'open' }
                    ]},
                    { week: 18, type: 'B', days: [
                        { id: '2026-04-27', dateStr: '27.04', day: 'Måndag', early: 'Jacob, Johannes F, Hanna', late: 'Cassie, Emma, Johannes L', status: 'open' },
                        { id: '2026-04-28', dateStr: '28.04', day: 'Tysdag', early: 'Nora, Noa, Serina', late: 'Linnea, Magnus, Celina', status: 'open' },
                        { id: '2026-04-29', dateStr: '29.04', day: 'Onsdag', early: 'Cassie, Emma, Loke', late: 'Hanna, Enea, Kasper', status: 'open' },
                        { id: '2026-04-30', dateStr: '30.04', day: 'Torsdag', early: 'Sivert, Cecilie, Kamilla', late: 'Lone, Emil, Emilia', status: 'open' },
                        { id: '2026-05-01', dateStr: '01.05', day: 'Fredag', early: 'Inga vakt', late: 'Inga vakt', status: 'closed', note: 'Offentleg høgtidsdag' }
                    ]}
                ]
            },

            init() {
                document.getElementById('password-input').focus();
            },

            async login() {
                const password = document.getElementById('password-input').value.trim();
                if (!password) return;

                const btn = document.getElementById('login-btn');
                const errEl = document.getElementById('login-error');
                btn.textContent = '⏳ Logger inn...';
                btn.disabled = true;
                errEl.classList.add('hidden');

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'load', role: APP_ROLE, password })
                    });
                    const json = await res.json();

                    if (json.error) {
                        errEl.textContent = json.error;
                        errEl.classList.remove('hidden');
                        btn.textContent = 'Logg inn';
                        btn.disabled = false;
                        return;
                    }

                    this.state.password = password;
                    this.state.attendance = json.attendance || {};
                    this.state.tasks = json.tasks || {};
                    this.state.menus = json.menus || {};

                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');

                    this.state.currentDateId = this.getInitialDateId();
                    this.populateDateSelector();
                    this.renderToday();

                    setInterval(() => this.fetchDataFromAPI(true), 10000);

                } catch (e) {
                    errEl.textContent = 'Kunne ikkje nå serveren. Prøv igjen.';
                    errEl.classList.remove('hidden');
                    btn.textContent = 'Logg inn';
                    btn.disabled = false;
                }
            },

            async fetchDataFromAPI(silent = false) {
                if (!silent) document.getElementById('sync-status').textContent = '⏳ Hentar data...';
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'load', role: APP_ROLE, password: this.state.password })
                    });
                    const json = await res.json();
                    if (json.error) return;

                    this.state.attendance = json.attendance || {};
                    this.state.tasks = json.tasks || {};
                    this.state.menus = json.menus || {};
                    this.renderToday();
                    document.getElementById('sync-status').textContent = '🟢 Oppdatert';
                } catch (e) {
                    document.getElementById('sync-status').textContent = '🟡 Frakobla';
                }
            },

            async pushDataToAPI(dateId, taskKey, value) {
                document.getElementById('sync-status').textContent = '⏳ Lagrar...';
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'save', role: APP_ROLE, password: this.state.password, type: 'tasks', dateId, key: taskKey, value })
                    });
                    document.getElementById('sync-status').textContent = '🟢 Oppdatert';
                } catch (e) {
                    document.getElementById('sync-status').textContent = '🔴 Feil ved lagring';
                }
            },

            getInitialDateId() {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                for (const week of this.data.schedule) {
                    for (const day of week.days) {
                        if (new Date(day.id) >= today && day.status === 'open') return day.id;
                    }
                }
                return this.data.schedule[0].days[0].id;
            },

            getDayData(dateId) {
                for (const week of this.data.schedule) {
                    const day = week.days.find(d => d.id === dateId);
                    if (day) return { day, week };
                }
                return null;
            },

            populateDateSelector() {
                const selector = document.getElementById('date-selector');
                selector.innerHTML = '';
                this.data.schedule.forEach(week => {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = `Veke ${week.week} (Turnus ${week.type})`;
                    week.days.forEach(day => {
                        const option = document.createElement('option');
                        option.value = day.id;
                        option.textContent = `${day.day} ${day.dateStr}`;
                        if (day.id === this.state.currentDateId) option.selected = true;
                        optgroup.appendChild(option);
                    });
                    selector.appendChild(optgroup);
                });
            },

            selectDate(dateId) {
                this.state.currentDateId = dateId;
                this.renderToday();
            },

            toggleTask(type, index) {
                const dateId = this.state.currentDateId;
                if (!this.state.tasks[dateId]) this.state.tasks[dateId] = {};
                const taskKey = `${type}_${index}`;
                const newValue = !(this.state.tasks[dateId][taskKey] || false);
                this.state.tasks[dateId][taskKey] = newValue;
                this.renderToday();
                this.pushDataToAPI(dateId, taskKey, newValue);
            },

            renderToday() {
                const data = this.getDayData(this.state.currentDateId);
                if (!data) return;
                const { day, week } = data;
                const dateId = day.id;

                document.getElementById('current-week-badge').textContent = `Veke ${week.week} (Turnus ${week.type})`;
                document.getElementById('current-date-display').textContent = `${day.day} ${day.dateStr}`;
                document.getElementById('driftsleiar-name').textContent = this.data.driftsleiarar[day.day] || 'Ingen satt';

                const contentDiv = document.getElementById('today-content');
                const menuContainer = document.getElementById('menu-container');

                if (day.status === 'closed') {
                    menuContainer.innerHTML = '';
                    contentDiv.innerHTML = `
                        <div class="lg:col-span-3 bg-red-50 border border-red-200 rounded-xl p-8 text-center">
                            <span class="text-4xl mb-4 block">🚫</span>
                            <h3 class="text-2xl font-bold text-red-800 mb-2">Kantina er stengt</h3>
                            <p class="text-red-600 text-lg">${day.note || 'Fri'}</p>
                        </div>`;
                    return;
                }

                const currentMenuText = this.state.menus[dateId]?.['dagens'] || '';
                menuContainer.innerHTML = `
                    <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 shadow-sm">
                        <div class="flex items-center mb-2">
                            <span class="text-2xl mr-3">🍲</span>
                            <h3 class="text-xl font-bold text-amber-900">Dagens Meny</h3>
                        </div>
                        <p class="text-amber-800 text-lg font-medium ml-9">
                            ${currentMenuText ? currentMenuText : '<i class="text-amber-700/60 font-normal">Ingen meny er lagt inn for denne dagen enno.</i>'}
                        </p>
                    </div>`;

                const renderStudents = (studentString) => {
                    return studentString.split(',').map(n => {
                        const name = n.trim();
                        const isPresent = this.state.attendance[dateId]?.[name] ?? true;
                        const btnClass = isPresent
                            ? 'bg-emerald-50 text-emerald-900 border-emerald-200 shadow-sm'
                            : 'bg-red-50 text-red-800 border-red-200 opacity-60';
                        const icon = isPresent ? '✅' : '❌ Fråvær';
                        const textDecor = isPresent ? '' : 'line-through text-red-500';
                        return `
                            <div class="w-full px-4 py-3 rounded-lg border cursor-default flex items-center justify-between ${btnClass}">
                                <span class="font-medium ${textDecor}">${name}</span>
                                <span class="text-sm font-bold">${icon}</span>
                            </div>`;
                    }).join('');
                };

                const renderTasks = (type, tasksList) => {
                    return tasksList.map((task, index) => {
                        const taskKey = `${type}_${index}`;
                        const isDone = this.state.tasks[dateId]?.[taskKey] || false;
                        return `
                            <label class="flex items-start space-x-3 p-2 rounded transition cursor-pointer hover:bg-slate-50">
                                <input type="checkbox" onchange="app.toggleTask('${type}', ${index})" ${isDone ? 'checked' : ''}
                                    class="mt-1 w-5 h-5 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
                                <span class="${isDone ? 'line-through text-slate-400' : 'text-slate-700'}">${task}</span>
                            </label>`;
                    }).join('');
                };

                contentDiv.innerHTML = `
                    <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                        <div class="flex items-center mb-4">
                            <span class="text-2xl mr-3">☀️</span>
                            <div>
                                <h3 class="text-xl font-bold text-slate-800">Tidleg Vakt</h3>
                                <p class="text-sm font-medium text-indigo-600">11:00 – 11:30</p>
                            </div>
                        </div>
                        <div class="space-y-2 mt-2">${renderStudents(day.early)}</div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                        <div class="flex items-center mb-4">
                            <span class="text-2xl mr-3">🌙</span>
                            <div>
                                <h3 class="text-xl font-bold text-slate-800">Seint Vakt</h3>
                                <p class="text-sm font-medium text-indigo-600">11:25 – 11:40</p>
                            </div>
                        </div>
                        <div class="space-y-2 mt-2">${renderStudents(day.late)}</div>
                    </div>
                    <div class="bg-slate-100 border border-slate-200 rounded-xl p-6 shadow-inner">
                        <div class="flex items-center mb-4">
                            <span class="text-2xl mr-3">📋</span>
                            <h3 class="text-xl font-bold text-slate-800">Sjekkliste</h3>
                        </div>
                        <div class="mb-4">
                            <p class="font-semibold text-slate-800 border-b border-slate-300 pb-1 mb-2">Tidleg vakt oppgåver:</p>
                            <div class="space-y-1">${renderTasks('early', this.data.tasksList.early)}</div>
                        </div>
                        <div>
                            <p class="font-semibold text-slate-800 border-b border-slate-300 pb-1 mb-2">Seint vakt oppgåver:</p>
                            <div class="space-y-1">${renderTasks('late', this.data.tasksList.late)}</div>
                        </div>
                    </div>`;
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
