<!DOCTYPE html>
<html lang="nn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR-etikettar - Tørrvarelager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @media print {
      body { background: #fff !important; }
      .no-print { display: none !important; }
      .label-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6mm; }
      .shelf-label { break-inside: avoid; box-shadow: none !important; border: 1px solid #000 !important; }
    }
  </style>
</head>
<body class="min-h-screen bg-stone-100 text-slate-900 antialiased">
  <div id="login-screen" class="no-print flex min-h-screen items-center justify-center px-4">
    <main class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
      <p class="text-xs font-semibold uppercase tracking-wide text-sky-700">SkuleTech</p>
      <h1 class="mt-1 text-3xl font-black tracking-tight text-slate-950">QR-etikettar</h1>
      <p class="mt-2 text-sm text-slate-600">Logg inn for å hente varelista og skrive ut etikettar.</p>

      <div class="mt-6 space-y-4">
        <label class="block">
          <span class="text-sm font-semibold text-slate-700">Rolle</span>
          <select id="role-input" class="mt-1 w-full rounded-lg border border-slate-300 bg-white p-3">
            <option value="driftsleiar">Driftsleiar</option>
            <option value="laerar">Lærar/admin</option>
          </select>
        </label>
        <label class="block">
          <span class="text-sm font-semibold text-slate-700">Passord</span>
          <input id="password-input" type="password" class="mt-1 w-full rounded-lg border border-slate-300 bg-white p-3" onkeydown="if(event.key==='Enter') app.login()">
        </label>
        <p id="login-error" class="hidden rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-800"></p>
        <button id="login-btn" onclick="app.login()" class="w-full rounded-lg bg-sky-700 px-4 py-3 font-bold text-white hover:bg-sky-800">Logg inn</button>
        <a href="dashbord.html" class="block text-center text-sm font-semibold text-sky-700">Til dashbord</a>
      </div>
    </main>
  </div>

  <div id="app-screen" class="hidden">
    <header class="no-print border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex flex-col justify-between gap-3 sm:flex-row sm:items-center">
          <div>
            <p class="text-xs font-semibold uppercase tracking-wide text-sky-700">Tørrvarelager</p>
            <h1 class="text-2xl font-black tracking-tight text-slate-950">QR-etikettar</h1>
          </div>
          <div class="flex flex-wrap gap-2">
            <a href="dashbord.html" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-bold text-slate-700 shadow-sm">Dashbord</a>
            <button onclick="window.print()" class="rounded-lg bg-sky-700 px-3 py-2 text-sm font-bold text-white shadow-sm hover:bg-sky-800">Skriv ut</button>
          </div>
        </div>
        <div class="grid gap-3 md:grid-cols-[1fr_220px]">
          <input id="label-search" oninput="app.renderLabels()" class="rounded-lg border border-slate-300 bg-white px-3 py-2" placeholder="Søk etter vare">
          <select id="label-category" onchange="app.renderLabels()" class="rounded-lg border border-slate-300 bg-white px-3 py-2"></select>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <div id="labels" class="label-grid grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    </main>
  </div>

<script>
const API_URL = 'api/index.php';

const app = {
  items: [],
  categories: [],

  init() {
    document.getElementById('password-input').focus();
  },

  async login() {
    const role = document.getElementById('role-input').value;
    const password = document.getElementById('password-input').value.trim();
    if (!password) return;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    btn.disabled = true;
    btn.textContent = 'Loggar inn...';
    err.classList.add('hidden');
    try {
      const json = await this.post({ action: 'admin_load', role, password });
      if (json.error) {
        err.textContent = json.error;
        err.classList.remove('hidden');
        return;
      }
      this.items = (json.items || []).filter(i => i.active);
      this.categories = json.categories || [];
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-screen').classList.remove('hidden');
      this.renderFilters();
      this.renderLabels();
    } catch {
      err.textContent = 'Kunne ikkje nå serveren.';
      err.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Logg inn';
    }
  },

  async post(payload) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return res.json();
  },

  renderFilters() {
    document.getElementById('label-category').innerHTML = '<option value="">Alle kategoriar</option>' + this.categories
      .filter(c => c.active)
      .map(c => `<option value="${c.id}">${this.esc(c.name)}</option>`)
      .join('');
  },

  renderLabels() {
    const term = (document.getElementById('label-search')?.value || '').toLowerCase();
    const categoryId = Number(document.getElementById('label-category')?.value || 0);
    const items = this.items.filter(item => {
      if (categoryId && item.categoryId !== categoryId) return false;
      if (!term) return true;
      return `${item.name} ${item.category} ${item.shelfLabel}`.toLowerCase().includes(term);
    });

    document.getElementById('labels').innerHTML = items.map(item => `
      <article class="shelf-label grid grid-cols-[104px_1fr] gap-4 rounded-lg border border-slate-300 bg-white p-4 shadow-sm">
        <div id="qr-${item.id}" class="flex h-24 w-24 items-center justify-center bg-white text-[9px] leading-tight text-slate-500"></div>
        <div class="min-w-0">
          <p class="text-xs font-bold uppercase tracking-wide text-sky-700">${this.esc(item.category)}</p>
          <h2 class="mt-1 break-words text-xl font-black leading-tight text-slate-950">${this.esc(item.name)}</h2>
          <p class="mt-2 text-sm font-semibold text-slate-700">${this.esc(item.shelfLabel) || 'Hylle ikkje sett'}</p>
          <p class="mt-1 break-all text-[10px] text-slate-500">${this.esc(this.itemUrl(item))}</p>
        </div>
      </article>
    `).join('') || '<p class="text-slate-500">Ingen etikettar å vise.</p>';

    setTimeout(() => this.drawCodes(items), 0);
  },

  drawCodes(items) {
    items.forEach(item => {
      const target = document.getElementById(`qr-${item.id}`);
      if (!target) return;
      target.innerHTML = '';
      if (window.QRCode) {
        new QRCode(target, {
          text: this.itemUrl(item),
          width: 96,
          height: 96,
          correctLevel: QRCode.CorrectLevel.M
        });
      } else {
        target.textContent = this.itemUrl(item);
      }
    });
  },

  itemUrl(item) {
    const url = new URL('vare.html', location.href);
    url.searchParams.set('vare', item.qrToken);
    return url.href;
  },

  esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
